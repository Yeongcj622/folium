<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 72" preserveAspectRatio="xMidYMid slice">
  <defs>

    <!-- Sky: bright cyan-blue top → light cyan haze at horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7af4ff"/>
      <stop offset="28%"  stop-color="#50e8fa"/>
      <stop offset="65%"  stop-color="#70eeff"/>
      <stop offset="100%" stop-color="#b0f6ff"/>
    </linearGradient>

    <!-- Horizon haze -->
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8f6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c8f6ff" stop-opacity="0.32"/>
    </linearGradient>

    <!-- Sun warmth upper-right -->
    <radialGradient id="sun" cx="90%" cy="0%" r="38%">
      <stop offset="0%"   stop-color="#fffac0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fffac0" stop-opacity="0"/>
    </radialGradient>

    <!-- Cloud lit face: white top, cool-gray base -->
    <radialGradient id="cg1" cx="48%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#cddee8"/>
    </radialGradient>
    <radialGradient id="cg2" cx="48%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#cddee8"/>
    </radialGradient>
    <radialGradient id="cg3" cx="48%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#cddee8"/>
    </radialGradient>
    <radialGradient id="cg4" cx="48%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#cddee8"/>
    </radialGradient>
    <radialGradient id="cg5" cx="48%" cy="28%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#cddee8"/>
    </radialGradient>

    <!-- Soft blur for cloud shadow/base -->
    <filter id="csf" x="-8%" y="-15%" width="116%" height="130%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>

    <!-- Wood seat gradient: top highlight → mid grain → dark bottom -->
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0c060"/>
      <stop offset="30%"  stop-color="#c88028"/>
      <stop offset="80%"  stop-color="#9a5c10"/>
      <stop offset="100%" stop-color="#7a3e08"/>
    </linearGradient>

    <!-- Wood front-edge (darker face) -->
    <linearGradient id="wood-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a3e08"/>
      <stop offset="100%" stop-color="#4a2004"/>
    </linearGradient>

    <!-- Seat soft drop shadow -->
    <filter id="seat-dropshadow" x="-15%" y="-30%" width="140%" height="220%">
      <feDropShadow dx="1.5" dy="3" stdDeviation="2.8" flood-color="#000" flood-opacity="0.38"/>
    </filter>

    <!-- Dark overlay for text legibility -->
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#060412" stop-opacity="0.10"/>
      <stop offset="45%"  stop-color="#060412" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#060412" stop-opacity="0.22"/>
    </linearGradient>

  </defs>

  <!-- ── Sky layers ─────────────────────────────────────── -->
  <rect width="1400" height="72" fill="url(#sky)"/>
  <rect width="1400" height="72" fill="url(#sun)"/>
  <rect width="1400" height="72" fill="url(#haze)"/>

  <!-- ── Cloud A – left, large ─────────────────────────── -->
  <!-- Soft shadow underside -->
  <g filter="url(#csf)" opacity="0.38">
    <ellipse cx="114" cy="63" rx="64" ry="16" fill="#7898a8"/>
    <ellipse cx="80"  cy="67" rx="38" ry="13" fill="#7898a8"/>
    <ellipse cx="154" cy="67" rx="42" ry="13" fill="#7898a8"/>
  </g>
  <!-- Main lit body -->
  <ellipse cx="114" cy="53" rx="64" ry="24" fill="url(#cg1)"/>
  <ellipse cx="78"  cy="60" rx="38" ry="20" fill="#f0f7fb"/>
  <ellipse cx="156" cy="59" rx="43" ry="20" fill="#eef5fa"/>
  <!-- Upper bright dome -->
  <ellipse cx="114" cy="36" rx="50" ry="25" fill="white"/>
  <ellipse cx="84"  cy="44" rx="33" ry="22" fill="white"/>
  <ellipse cx="146" cy="42" rx="37" ry="22" fill="white"/>
  <!-- Specular highlights (top-left) -->
  <ellipse cx="98"  cy="30" rx="24" ry="15" fill="white" opacity="0.95"/>
  <ellipse cx="125" cy="27" rx="19" ry="13" fill="white" opacity="0.88"/>
  <!-- Bottom shadow tint -->
  <ellipse cx="114" cy="66" rx="60" ry="10" fill="#c0d4e0" opacity="0.25"/>

  <!-- ── Cloud B – centre-left ──────────────────────────── -->
  <g filter="url(#csf)" opacity="0.35">
    <ellipse cx="378" cy="46" rx="72" ry="15" fill="#7898a8"/>
    <ellipse cx="335" cy="50" rx="40" ry="12" fill="#7898a8"/>
    <ellipse cx="423" cy="49" rx="46" ry="12" fill="#7898a8"/>
  </g>
  <ellipse cx="378" cy="37" rx="72" ry="21" fill="url(#cg2)"/>
  <ellipse cx="333" cy="44" rx="40" ry="18" fill="#f0f7fb"/>
  <ellipse cx="424" cy="43" rx="46" ry="18" fill="#eef5fa"/>
  <ellipse cx="378" cy="21" rx="56" ry="23" fill="white"/>
  <ellipse cx="345" cy="30" rx="32" ry="20" fill="white"/>
  <ellipse cx="413" cy="28" rx="36" ry="20" fill="white"/>
  <ellipse cx="362" cy="15" rx="26" ry="15" fill="white" opacity="0.92"/>
  <ellipse cx="394" cy="13" rx="22" ry="13" fill="white" opacity="0.86"/>
  <ellipse cx="378" cy="48" rx="68" ry="9"  fill="#c0d4e0" opacity="0.22"/>

  <!-- ── Cloud C – small wispy centre-right ────────────── -->
  <g opacity="0.72">
    <ellipse cx="735" cy="28" rx="48" ry="12" fill="#e8f2f8"/>
    <ellipse cx="710" cy="33" rx="25" ry="11" fill="#f2f8fc"/>
    <ellipse cx="761" cy="33" rx="29" ry="11" fill="#f0f7fb"/>
    <ellipse cx="735" cy="17" rx="36" ry="13" fill="white"/>
    <ellipse cx="720" cy="13" rx="18" ry="11" fill="white" opacity="0.88"/>
    <ellipse cx="752" cy="11" rx="16" ry="10" fill="white" opacity="0.82"/>
  </g>

  <!-- ── Cloud D – right, large ────────────────────────── -->
  <g filter="url(#csf)" opacity="0.35">
    <ellipse cx="1056" cy="49" rx="76" ry="16" fill="#7898a8"/>
    <ellipse cx="1012" cy="53" rx="44" ry="13" fill="#7898a8"/>
    <ellipse cx="1103" cy="52" rx="48" ry="13" fill="#7898a8"/>
  </g>
  <ellipse cx="1056" cy="39" rx="76" ry="22" fill="url(#cg3)"/>
  <ellipse cx="1010" cy="46" rx="44" ry="19" fill="#f0f7fb"/>
  <ellipse cx="1104" cy="46" rx="48" ry="19" fill="#eef5fa"/>
  <ellipse cx="1056" cy="23" rx="60" ry="24" fill="white"/>
  <ellipse cx="1022" cy="32" rx="34" ry="20" fill="white"/>
  <ellipse cx="1092" cy="30" rx="38" ry="21" fill="white"/>
  <ellipse cx="1040" cy="16" rx="28" ry="16" fill="white" opacity="0.92"/>
  <ellipse cx="1072" cy="14" rx="24" ry="14" fill="white" opacity="0.86"/>
  <ellipse cx="1056" cy="51" rx="72" ry="9"  fill="#c0d4e0" opacity="0.22"/>

  <!-- ── Cloud E – far right, medium ───────────────────── -->
  <g filter="url(#csf)" opacity="0.32">
    <ellipse cx="1316" cy="58" rx="54" ry="14" fill="#7898a8"/>
    <ellipse cx="1282" cy="62" rx="32" ry="11" fill="#7898a8"/>
    <ellipse cx="1353" cy="61" rx="36" ry="11" fill="#7898a8"/>
  </g>
  <g opacity="0.9">
    <ellipse cx="1316" cy="49" rx="54" ry="20" fill="url(#cg4)"/>
    <ellipse cx="1280" cy="56" rx="32" ry="17" fill="#f0f7fb"/>
    <ellipse cx="1354" cy="56" rx="36" ry="17" fill="#eef5fa"/>
    <ellipse cx="1316" cy="34" rx="42" ry="20" fill="white"/>
    <ellipse cx="1296" cy="42" rx="26" ry="17" fill="white"/>
    <ellipse cx="1338" cy="40" rx="30" ry="17" fill="white"/>
    <ellipse cx="1304" cy="28" rx="20" ry="13" fill="white" opacity="0.9"/>
    <ellipse cx="1330" cy="26" rx="18" ry="12" fill="white" opacity="0.84"/>
  </g>

  <!-- ── Birds ──────────────────────────────────────────── -->
  <g stroke="#144468" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.52">
    <!-- left flock: 3 birds, natural M-wing shape -->
    <path d="M484 32 Q487.5 27 491 30.5 Q494.5 27 498 31"/>
    <path d="M504 38 Q507.5 33 511 36.5 Q514.5 33 518 37"/>
    <path d="M496 44 Q499.5 39 503 42.5 Q506.5 39 510 43"/>
    <!-- right flock: 2 birds, smaller (distance) -->
    <path d="M1145 19 Q1148 14.5 1151 17.5 Q1154 14.5 1157 18"/>
    <path d="M1160 25 Q1163 20.5 1166 23.5 Q1169 20.5 1172 24"/>
  </g>

  <!-- ── Swing – side view, 35° ────────────────────────── -->

  <!-- Rope ambient shadow (soft blur behind rope) -->
  <path d="M30,1 C39,19 55,36 71,51"
        stroke="#000" stroke-width="7" fill="none"
        stroke-linecap="round" opacity="0.18"/>

  <!-- Far rope (back strand, depth illusion) -->
  <path d="M31,-1 C40,17 56,34 72,49"
        stroke="#6b4010" stroke-width="2.8" fill="none"
        stroke-linecap="round" opacity="0.45"/>

  <!-- Rope core -->
  <path d="M28,-1 C37,17 53,34 69,49"
        stroke="#3e2006" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Rope mid tone -->
  <path d="M28,-1 C37,17 53,34 69,49"
        stroke="#9a6018" stroke-width="3.8" fill="none" stroke-linecap="round"/>

  <!-- Twisted strand A -->
  <path d="M28,-1 C37,17 53,34 69,49"
        stroke="#d09828" stroke-width="1.6" fill="none" stroke-linecap="round"
        stroke-dasharray="6 5"/>

  <!-- Twisted strand B (offset) -->
  <path d="M28,-1 C37,17 53,34 69,49"
        stroke="#f0d060" stroke-width="0.7" fill="none" stroke-linecap="round"
        stroke-dasharray="6 5" stroke-dashoffset="5.5" opacity="0.6"/>

  <!-- Top pivot ring (where rope loops over branch) -->
  <ellipse cx="28" cy="0" rx="5" ry="3.5" fill="#2a1404"/>
  <ellipse cx="28" cy="0" rx="3.2" ry="2.2" fill="#7a4c14"/>
  <ellipse cx="27.5" cy="-0.5" rx="1.5" ry="1" fill="#c08828" opacity="0.7"/>

  <!-- Rope-to-seat lashing knot -->
  <ellipse cx="69" cy="49" rx="6" ry="4.5" fill="#2e1604"/>
  <ellipse cx="69" cy="49" rx="3.8" ry="2.8" fill="#7a4c14"/>
  <ellipse cx="68.5" cy="48.5" rx="1.8" ry="1.2" fill="#c08828" opacity="0.65"/>

  <!-- Seat plank shadow (ellipse on floor) -->
  <ellipse cx="82" cy="64" rx="34" ry="4.5" fill="black" opacity="0.18"
           transform="rotate(-5,82,64)"/>

  <!-- Seat plank 3D group -->
  <g filter="url(#seat-dropshadow)">

    <!-- Plank underside (bottom face – darkest) -->
    <rect x="46" y="57" width="58" height="5" rx="2"
          transform="rotate(-5, 69, 54)"
          fill="#4e2204"/>

    <!-- Plank right-end grain (end face seen from side) -->
    <rect x="102" y="48" width="5" height="12" rx="1.5"
          transform="rotate(-5, 69, 54)"
          fill="#6a3008"/>
    <!-- End grain rings -->
    <ellipse cx="104.5" cy="54" rx="1.8" ry="2.8" fill="#8a4c18" opacity="0.6"
             transform="rotate(-5, 69, 54)"/>

    <!-- Plank top face (main visible surface) -->
    <rect x="46" y="47" width="58" height="12" rx="3"
          transform="rotate(-5, 69, 53)"
          fill="url(#wood)"/>

    <!-- Wood grain lines -->
    <line x1="60" y1="46" x2="58" y2="60" stroke="#7a3c0a" stroke-width="1" opacity="0.3"
          transform="rotate(-5,69,53)"/>
    <line x1="70" y1="46" x2="69" y2="60" stroke="#7a3c0a" stroke-width="1" opacity="0.28"
          transform="rotate(-5,69,53)"/>
    <line x1="81" y1="46" x2="81" y2="60" stroke="#7a3c0a" stroke-width="1" opacity="0.28"
          transform="rotate(-5,69,53)"/>
    <line x1="92" y1="46" x2="93" y2="60" stroke="#7a3c0a" stroke-width="0.9" opacity="0.24"
          transform="rotate(-5,69,53)"/>

    <!-- Top-face sheen / specular highlight -->
    <rect x="48" y="47" width="54" height="3.5" rx="2"
          transform="rotate(-5, 69, 53)"
          fill="white" opacity="0.32"/>

    <!-- Rope groove (indentation where rope wraps seat) -->
    <ellipse cx="69" cy="48.5" rx="3" ry="5.5" fill="#3e1e04" opacity="0.55"
             transform="rotate(-5,69,53)"/>

  </g>

  <!-- ── Dark veil for text legibility ─────────────────── -->
  <rect width="1400" height="72" fill="url(#veil)"/>

</svg>
